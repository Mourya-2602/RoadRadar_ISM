name: road_radar
description: "A new Flutter project."
# Prevents accidental publication to pub.dev.
publish_to: 'none'

# Application versioning.
version: 1.0.0+1

# Dart SDK environment.
environment:
  sdk: ^3.6.1

# Dependencies for your application.
dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0
  flutter_map_location_marker: ^8.0.2
  latlong2: ^0.9.0
  geolocator: 11.1.0
  permission_handler: ^11.4.0
  cupertino_icons: ^1.0.8
  mongo_dart: ^0.10.4
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  dotenv: ^4.2.0
  flutter_dotenv: ^5.2.1
  http: ^1.2.0
  shared_preferences: ^2.2.2
  crypto: ^3.0.3

# Development dependencies.
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# Flutter-specific configurations.
flutter:
  # Ensures Material Icons font is included.
  uses-material-design: true

  # Fonts configuration.
  fonts:
    - family: Raleway
      fonts:
        - asset: fonts/Raleway-VariableFont_wght.ttf

  # To add assets, uncomment and use the assets section:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
